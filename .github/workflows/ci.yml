name: CI

# Runs on every PR and push to main. Guards the money/security paths (pytest)
# and proves both container images still build before anything can deploy.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    name: Backend — pytest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fieldos-backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"       # 3.11/3.12 only — 3.14 breaks pydantic
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests
        # Tests use an isolated /tmp DB (see tests/conftest.py) — no dev data touched.
        run: pytest -q

  dashboard-build:
    name: Dashboard — build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fieldos-dashboard
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: fieldos-dashboard/package-lock.json

      - run: npm ci
      - run: npm run build

  docker-build:
    name: Docker images build
    runs-on: ubuntu-latest
    needs: [backend-tests, dashboard-build]
    steps:
      - uses: actions/checkout@v4
      # Build both images to catch Dockerfile drift before deploy. No push here.
      - name: Build backend image
        run: docker build -t fieldos-backend:ci ./fieldos-backend
      - name: Build dashboard image
        run: docker build -t fieldos-dashboard:ci ./fieldos-dashboard
