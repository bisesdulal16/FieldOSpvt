name: Deploy (EC2)

# Ships main to the EC2 pilot box after CI passes. Also runnable on demand
# from the Actions tab (workflow_dispatch).
#
# Requires these repo secrets (Settings → Secrets and variables → Actions):
#   EC2_HOST      public IP or hostname of the instance
#   EC2_USER      ssh user (ubuntu on the stock Ubuntu AMI)
#   EC2_SSH_KEY   contents of the .pem private key for that user
#   DEPLOY_PATH   absolute path to the checked-out repo on the server
#                 (e.g. /home/ubuntu/fieldos)
#
# The server holds its own .env (never in git). This job only pulls code and
# rebuilds the stack; it does not manage secrets.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-ec2
  cancel-in-progress: false

jobs:
  deploy:
    name: SSH deploy
    runs-on: ubuntu-latest
    # Only deploy when the CI run succeeded (or when triggered manually).
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -euo pipefail
            cd "${{ secrets.DEPLOY_PATH }}"
            git fetch --all
            git reset --hard origin/main
            docker compose -f docker-compose.yml -f docker-compose.prod.yml pull || true
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
            docker compose -f docker-compose.yml -f docker-compose.prod.yml restart nginx
            docker image prune -f
            docker compose -f docker-compose.yml -f docker-compose.prod.yml ps
