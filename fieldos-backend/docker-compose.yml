services:
  postgres:
    image: postgres:16-alpine
    container_name: fieldos-postgres
    environment:
      POSTGRES_USER: fieldos
      POSTGRES_PASSWORD: fieldos
      POSTGRES_DB: fieldos_nepal
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fieldos"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: fieldos-backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://fieldos:fieldos@postgres:5432/fieldos_nepal
      JWT_SECRET_KEY: fieldos-nepal-super-secret-key-change-in-production
      APP_ENV: development
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
    restart: unless-stopped

volumes:
  postgres_data:
